name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request for a large change, consider starting a Discussion instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What's currently missing or painful?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend / UI
        - Rust backend
        - Claude session / prompt
        - Job platform support
        - Notifications
        - Profile management
        - Feedback / analytics
        - Documentation
        - Other
    validations:
      required: true
