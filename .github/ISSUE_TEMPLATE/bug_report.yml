name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: os
    attributes:
      label: Windows version
      description: Run `winver` and paste the result
      placeholder: "Windows 11 Home 26200.xxxx"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Claudia RH version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: Claude Code CLI version
      description: Run `claude --version`
      placeholder: "1.x.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: pty-output
    attributes:
      label: Terminal / PTY output
      description: Paste relevant output from the Terminal tab if applicable
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, logs, anything else that might help
